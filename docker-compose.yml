version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: network_graph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/network_graph
      DATA_MODE: SYNTHETIC
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python load_data.py --db-url postgresql://postgres:postgres@db:5432/network_graph &&
             python run_detections.py --db-url postgresql://postgres:postgres@db:5432/network_graph &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://api:8000

volumes:
  pgdata:
